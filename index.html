<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <meta name="format-detection" content="telephone=no">
  <title>材料管理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css?v=12">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23FF9500'/><text x='90' y='125' font-size='100' text-anchor='middle' fill='white' font-weight='bold'>材</text></svg>">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-inner">
        <button id="header-back" class="header-btn hidden" onclick="goBack()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <h1 id="header-title">材料管理</h1>
        <div id="header-right" class="header-btn"></div>
      </div>
      <div id="header-subtitle" class="header-subtitle">そうろう橋 炭素繊維補強工</div>
    </header>

    <main id="main-content">
      <div id="screen-home" class="screen active"></div>
      <div id="screen-receipt" class="screen"></div>
      <div id="screen-mixing" class="screen"></div>
      <div id="screen-usage" class="screen"></div>
      <div id="screen-inventory" class="screen"></div>
      <div id="screen-field" class="screen"></div>
      <div id="screen-log" class="screen"></div>
      <div id="screen-report" class="screen"></div>
    </main>

    <nav id="tab-bar">
      <button data-screen="home" class="tab active">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="tab-label">ホーム</span>
      </button>
      <button data-screen="receipt" class="tab">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="12 2 12 12"/><polyline points="8 17 12 12 16 17"/></svg>
        <span class="tab-label">搬入</span>
      </button>
      <button data-screen="mixing" class="tab">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/><circle cx="12" cy="12" r="4"/></svg>
        <span class="tab-label">混合</span>
      </button>
      <button data-screen="field" class="tab">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
        <span class="tab-label">現場</span>
      </button>
      <button data-screen="log" class="tab">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span class="tab-label">分析</span>
      </button>
    </nav>
  </div>

  <div id="toast" class="toast"></div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content"></div>
  </div>

  <script src="js/db.js?v=12"></script>
  <script src="js/app.js?v=12"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
